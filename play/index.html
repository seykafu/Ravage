<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Ravage</title>

    <!-- Google Analytics (GA4) with Consent Mode v2. Mirrors /index.html
         so /play is tracked as its own page view and shares the same
         consent decision (both pages read the same localStorage key).
         If the player accepted on the landing page, the upgrade fires
         here too before the first play-page hit goes out. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      gtag('consent', 'default', {
        ad_storage: 'denied',
        analytics_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        wait_for_update: 500
      });
      try {
        if (localStorage.getItem('ravage:consent:v1') === 'granted') {
          gtag('consent', 'update', {
            ad_storage: 'granted',
            analytics_storage: 'granted',
            ad_user_data: 'granted',
            ad_personalization: 'granted'
          });
        }
      } catch (e) { /* localStorage blocked → stay denied */ }
      gtag('js', new Date());
      if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
        gtag('config', 'G-XSNSMMB78R');
      }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XSNSMMB78R"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700&family=Pixelify+Sans:wght@400;500;600;700&display=swap"
    />
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        background: #05060a;
        color: #e8eaf2;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        overflow: hidden;
        height: 100%;
        /* Touch hardening: stop the page from scrolling, zooming, or showing
           the long-press text-selection UI when the player drags a unit on
           the battle grid. */
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      #app {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(ellipse at 50% 35%, rgba(96, 60, 40, 0.30), transparent 60%),
          radial-gradient(ellipse at 50% 80%, rgba(20, 30, 60, 0.55), transparent 70%),
          linear-gradient(180deg, #06080f 0%, #02030a 100%);
        touch-action: none;
      }
      /* Pixel-perfect scaling: keep crisp edges. */
      #app canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        /* "3D feel" — soft chromatic aberration + faint scanlines + warm bloom */
        filter:
          drop-shadow(0 14px 30px rgba(0, 0, 0, 0.55))
          drop-shadow(0 0 12px rgba(220, 170, 90, 0.08))
          contrast(1.04)
          saturate(1.06);
        box-shadow: 0 0 0 1px rgba(255, 220, 160, 0.05) inset;
      }
      /* Subtle moving vignette overlay for depth */
      #app::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%),
          repeating-linear-gradient(
            180deg,
            rgba(255,255,255,0.012) 0 1px,
            transparent 1px 3px
          );
        mix-blend-mode: multiply;
        z-index: 2;
      }
      #loader {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 3;
        font-size: 14px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #c9b07a;
        text-shadow: 0 0 12px rgba(201, 176, 122, 0.5);
        pointer-events: none;
      }
      #loader.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="loader">Ravage — loading…</div>

    <!-- ============== GDPR consent banner ============== -->
    <!-- Mirror of the banner in /index.html. Shares the localStorage
         key 'ravage:consent:v1' so a user who accepted on the landing
         page won't see this on /play. Decline keeps gtag.js loaded
         in denied state — no cookies, no hits sent. The banner sits
         on top of the Phaser canvas via z-index 9999 + position fixed. -->
    <div id="cookie-banner" hidden>
      <p>
        Ravage uses cookies for anonymous analytics so we can see which battles
        are working and which need tuning. Your choice is saved on this device.
      </p>
      <div class="cookie-banner-actions">
        <button id="cookie-decline" type="button" class="cookie-btn">Decline</button>
        <button id="cookie-accept" type="button" class="cookie-btn cookie-btn-primary">Accept</button>
      </div>
    </div>
    <style>
      #cookie-banner {
        position: fixed;
        bottom: 16px;
        left: 16px;
        right: 16px;
        max-width: 760px;
        margin: 0 auto;
        background: #0d111c;
        border: 1px solid #c9b07a;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        padding: 16px 20px;
        z-index: 9999;
        font-family: "EB Garamond", "Georgia", "Times New Roman", serif;
        color: #e8eaf2;
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 14px;
        line-height: 1.45;
        pointer-events: auto;
      }
      /* The user-agent [hidden] { display: none } rule (specificity 0,1,0)
         loses to #cookie-banner { display: flex } (specificity 1,0,0), so
         setting banner.hidden = true did nothing visually. This rule wins
         the cascade because #cookie-banner[hidden] is (1,1,0). */
      #cookie-banner[hidden] { display: none; }
      #cookie-banner p { margin: 0; flex: 1; }
      .cookie-banner-actions { display: flex; gap: 8px; flex-shrink: 0; }
      .cookie-btn {
        padding: 8px 18px;
        background: #1c2032;
        border: 1px solid #6c7281;
        color: #dde6ef;
        font-family: "Cinzel", "Trajan Pro", serif;
        font-size: 13px;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease;
      }
      .cookie-btn:hover { background: #2a2a3a; border-color: #a0aabc; }
      .cookie-btn-primary { border-color: #c9b07a; color: #fff7c4; background: #131724; }
      .cookie-btn-primary:hover { background: #1c2032; border-color: #f2d997; }
      @media (max-width: 600px) {
        #cookie-banner { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px 16px; }
        .cookie-banner-actions { justify-content: flex-end; }
      }
    </style>
    <script>
      (function() {
        var STORAGE_KEY = 'ravage:consent:v1';
        var stored = null;
        try { stored = localStorage.getItem(STORAGE_KEY); } catch (e) { /* blocked */ }
        if (stored === 'granted' || stored === 'denied') return;
        var banner = document.getElementById('cookie-banner');
        if (!banner) return;
        banner.hidden = false;
        document.getElementById('cookie-accept').addEventListener('click', function() {
          try { localStorage.setItem(STORAGE_KEY, 'granted'); } catch (e) {}
          if (typeof gtag === 'function') {
            gtag('consent', 'update', {
              ad_storage: 'granted',
              analytics_storage: 'granted',
              ad_user_data: 'granted',
              ad_personalization: 'granted'
            });
          }
          banner.hidden = true;
        });
        document.getElementById('cookie-decline').addEventListener('click', function() {
          try { localStorage.setItem(STORAGE_KEY, 'denied'); } catch (e) {}
          banner.hidden = true;
        });
      })();
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
